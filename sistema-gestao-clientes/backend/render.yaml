services:
  - type: web
    name: sistema-gestao-clientes-api
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE
        value: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_PASSWORD_HASH
        sync: false
